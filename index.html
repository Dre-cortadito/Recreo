<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>El Recreo · Juegos de Cortadito</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,600&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#fffdf9;
    --paper:#ffffff;
    --ink:#171210;
    --muted:#8d8580;
    --line:#eee2d6;
    --red:#d9272e;
    --green:#5c853c;
    --coffee:#2a140d;
    --gold:#c47a3d;
    --shadow:0 30px 60px -40px rgba(23,18,16,.35);
  }
  html[data-theme="dark"]{
    --bg:#14100e;
    --paper:#201915;
    --ink:#f5ede3;
    --muted:#a79d93;
    --line:#332a22;
    --red:#f0575c;
    --green:#8fbf63;
    --gold:#d99a5c;
    --shadow:0 30px 60px -40px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Nunito Sans",-apple-system,system-ui,sans-serif;
    color:var(--ink);background:var(--bg);
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease,color .3s ease;
  }
  .serif{font-family:"Fraunces",Georgia,serif}

  /* ---------- top bar (masthead, estilo Racimo) ---------- */
  .masthead{border-bottom:1px solid var(--line)}
  .topbar{
    max-width:1000px;margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:15px 24px;
  }
  .brand{display:flex;align-items:center;gap:11px}
  .brand img{height:30px;width:auto;display:block;flex-shrink:0}
  .brand .wordmark{font-family:"Fraunces",serif;font-weight:700;font-size:21px;letter-spacing:-.01em;color:var(--ink)}
  .brand .dot{color:var(--gold)}
  .toggle{
    width:36px;height:36px;border-radius:50%;border:1px solid var(--line);
    background:transparent;color:var(--ink);cursor:pointer;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;
    transition:background .15s,color .15s,border-color .15s;
  }
  .toggle:hover{border-color:var(--muted);color:var(--red)}
  .toggle svg{width:17px;height:17px}

  /* ---------- hero title ---------- */
  .intro{max-width:760px;margin:0 auto;padding:34px 24px 8px;text-align:center}
  .intro h1{
    font-family:"Fraunces",serif;font-weight:900;letter-spacing:-.02em;
    font-size:clamp(48px,9vw,88px);line-height:.98;margin:0;color:var(--ink);
  }
  .intro p{
    font-family:"Fraunces",serif;font-style:italic;font-weight:500;
    color:var(--muted);font-size:clamp(18px,2.6vw,22px);margin:14px 0 0;
  }

  main{max-width:1000px;margin:0 auto;padding:20px 24px 100px}

  /* ---------- Racimo hero (wide, premium — colored panel) ---------- */
  .feature{
    display:flex;align-items:center;gap:36px;
    background:#f8d3ca;border:1px solid rgba(36,18,9,.07);border-radius:30px;
    margin:34px 0 0;padding:38px 46px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .feature::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(300px 240px at 100% 118%, rgba(92,133,60,.22), transparent 58%);
  }
  .feature .flogo{width:142px;height:142px;flex:none;position:relative;z-index:1}
  .feature .flogo svg{width:100%;height:100%;display:block}
  .feature .ftext{flex:1;min-width:0;position:relative;z-index:1}
  .feature .kick{display:inline-block;color:#a8151b;font-weight:800;font-size:12px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
  .feature h2{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(44px,7vw,64px);margin:0;line-height:1;color:#1c1108}
  .feature .q{font-family:"Fraunces",serif;font-style:italic;font-weight:500;color:#7c5c4f;font-size:clamp(18px,2.6vw,23px);margin:12px 0 0;max-width:30ch}
  .btn{
    flex:none;position:relative;z-index:1;display:inline-flex;align-items:center;gap:10px;text-decoration:none;
    font-weight:800;font-size:17px;padding:16px 42px;border-radius:999px;
    background:#fff;color:#141210;border:1.5px solid #141210;transition:background .18s ease,color .18s ease;
  }
  html[data-theme="dark"] .feature .btn{background:#fff;color:#141210}
  .btn:hover{background:#141210;color:#fff}
  .btn:active{transform:scale(.97)}
  .btn svg{width:17px;height:17px}
  @media(max-width:640px){
    .feature{flex-direction:column;text-align:center;padding:40px 26px}
    .feature .q{max-width:26ch}
    .feature .btn{width:100%;justify-content:center}
  }

  /* ---------- family sections ---------- */
  .fam{margin-top:60px}
  .fam-head{margin:0 0 20px;padding:0 4px}
  .fam-head h3{font-family:"Fraunces",serif;font-weight:900;font-size:clamp(30px,4.6vw,38px);margin:0;color:var(--ink);display:inline}
  .fam-head p{color:var(--muted);font-size:16px;margin:6px 0 0;font-style:italic;font-family:"Fraunces",serif;font-weight:500}

  .modes{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  @media(max-width:720px){.modes{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:460px){.modes{grid-template-columns:1fr;max-width:340px;margin:0 auto}}

  /* colorful poster cards */
  a.card{
    display:flex;flex-direction:column;text-decoration:none;background:var(--paper);
    border:1px solid var(--line);border-radius:24px;overflow:hidden;
    transition:transform .16s ease,box-shadow .16s ease;
  }
  a.card:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
  a.card .panel{display:flex;align-items:center;justify-content:center;padding:34px 20px 32px}
  a.card .panel .icon{width:126px;height:126px}
  a.card .panel .icon svg{width:100%;height:100%;display:block}
  a.card .cbody{padding:18px 20px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;flex:1}
  a.card .cat{font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:800;color:var(--muted);margin-bottom:6px}
  a.card .title{font-family:"Fraunces",serif;font-weight:900;font-size:29px;color:var(--ink);line-height:1;margin-bottom:7px}
  a.card .desc{color:var(--muted);font-size:15px;line-height:1.38;margin:0 0 16px;max-width:24ch;flex:1}
  a.card .go{
    display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:15px;
    background:#fff;color:#141210;border:1.5px solid #141210;padding:11px 26px;border-radius:999px;transition:.18s;
  }
  a.card:hover .go{background:#141210;color:#fff;border-color:#141210}
  a.card .go svg{width:14px;height:14px}

  footer{text-align:center;color:var(--muted);font-size:13px;padding:10px 24px 60px}
  footer a{color:var(--gold);text-decoration:none;font-weight:700}
</style>
</head>

   ===================================================================== */
const RACIMO = {
  name:"Racimo",
  question:"¿Cuántas palabras esconde este racimo?",
  logo: RACIMO_LOGO,
  url:"https://racimo.dre-c8f.workers.dev/"
};

const FAMILIES = [
  {
    family:"Palabreo", note:"Donde cada letra cuenta.",
    modes:[
      { name:"Clásico",  desc:"¿Cuál es la palabra de hoy?",       bg:"#ecd4e2", logo: palClasico("#9c3b6e"),  url:"https://palabreo.dre-c8f.workers.dev/?modo=clasico" },
      { name:"Trenza",   desc:"Teje la trenza con intercambios.",  bg:"#f3e3c4", logo: palTrenza("#c8862e"),   url:"https://palabreo.dre-c8f.workers.dev/?modo=trenza" },
      { name:"Cuarteto", desc:"Cuatro palabras a la vez.",         bg:"#d8daf3", logo: palCuarteto("#4f5bbf"), url:"https://palabreo.dre-c8f.workers.dev/?modo=cuarteto" }
    ]
  },
  {
    family:"Sudoku", note:"Cada número en su lugar.",
    modes:[
      { name:"Clásico", desc:"¿Qué patrón encontrarás hoy?",      bg:"#f6dac8", logo: sudoku3("#d9633b","#5b3a26"),   url:"https://sudoku.dre-c8f.workers.dev/?modo=clasico" },
      { name:"Mini",    desc:"Un sorbo. Tres minutos.",           bg:"#cfe6d5", logo: sudokuMini("#15803d","#2f3640"), url:"https://sudoku.dre-c8f.workers.dev/?modo=mini" },
      { name:"Niebla",  desc:"Despeja la niebla, celda a celda.",  bg:"#d2dde2", logo: sudoku3("#294f61","#8a5572"),   url:"https://sudoku.dre-c8f.workers.dev/?modo=niebla" }
    ]
  },
  {
    family:"Flechas", note:"Encuentra el camino correcto.",
    modes:[
      { name:"Cascada", desc:"Despeja antes de que caiga.",         bg:"#cfeeea", logo: flechasCascada("#4ECDC4","#ff6b6b"), url:"https://flechas.dre-c8f.workers.dev/cascada.html" },
      { name:"Borde",   desc:"Evita el borde, despeja el tablero.",  bg:"#e2d8ef", logo: FLECHAS_BORDE,                       url:"https://flechas.dre-c8f.workers.dev/" }
    ]
  }
];

/* =====================================================================
   RENDER
   ===================================================================== */
const ARROW=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg>`;
const app=document.getElementById("app");
const attrs=u=>u==="#"?'href="#" onclick="return false" title="Pega la URL en el archivo"':`href="${u}" target="_blank" rel="noopener"`;

app.insertAdjacentHTML("beforeend",`
  <section class="feature">
    <div class="flogo">${RACIMO.logo}</div>
    <div class="ftext">
      <span class="kick">Destacado</span>
      <h2>${RACIMO.name}</h2>
      <p class="q">${RACIMO.question}</p>
    </div>
    <a class="btn" ${attrs(RACIMO.url)}>Jugar ${ARROW}</a>
  </section>
`);

FAMILIES.forEach(fam=>{
  const cards=fam.modes.map(m=>`
    <a class="card" ${attrs(m.url)}>
      <div class="panel" style="background:${m.bg}">
        <div class="icon">${m.logo}</div>
      </div>
      <div class="cbody">
        <div class="cat">${fam.family}</div>
        <div class="title">${m.name}</div>
        <div class="desc">${m.desc}</div>
        <span class="go">Jugar ${ARROW}</span>
      </div>
    </a>`).join("");
  app.insertAdjacentHTML("beforeend",`
    <section class="fam">
      <div class="fam-head"><h3>${fam.family}</h3><p>${fam.note}</p></div>
      <div class="modes">${cards}</div>
    </section>
  `);
});

/* ---------- dark mode ---------- */
const SUN=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/></svg>`;
const MOON=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8z"/></svg>`;
const btn=document.getElementById("themeBtn");
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);btn.innerHTML=t==="dark"?SUN:MOON;try{localStorage.setItem("cortadito-theme",t);}catch(e){}}
let saved;try{saved=localStorage.getItem("cortadito-theme");}catch(e){}
applyTheme(saved||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));
btn.addEventListener("click",()=>applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"));
</script>
</body>
</html>
